<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ürün Detayı — Nazmuş Ana Çiftliği</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.paypal.com/sdk/js?client-id=test&currency=USD"></script>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">
        <span class="logo__icon">🫒</span>
        <span class="logo__text">Nazmuş Ana Çiftliği</span>
      </a>
      <nav class="nav">
        <a href="index.html#products">Ürünler</a>
        <a href="index.html#about">Hakkımızda</a>
        <a href="index.html#contact">İletişim</a>
      </nav>
      <div class="header__actions">
        <button class="cart-btn" id="cartBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span class="cart-count" id="cartCount">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- BREADCRUMB + DETAIL -->
  <section class="page-header">
    <div class="container">
      <p style="font-size:13px;color:var(--gray);margin-bottom:6px">
        <a href="index.html" style="color:var(--green)">Ana Sayfa</a> › Ürün Detayı
      </p>
      <h1 id="detayTitle">Yükleniyor…</h1>
    </div>
  </section>

  <div class="container" style="padding:48px 24px 80px">
    <div id="detayContent" style="display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start">
      <div class="skeleton" id="detaySkeleton"
        style="background:#f3f4f6;border-radius:16px;height:400px;animation:pulse 1.5s infinite"></div>
    </div>
  </div>

  <style>
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    #detayContent img { width:100%; border-radius:16px; object-fit:cover; max-height:420px; }
    .detay-info h2    { font-size:28px; font-weight:700; margin-bottom:12px; }
    .detay-info .price{ font-size:32px; font-weight:800; color:var(--green); margin:16px 0; }
    .detay-info .desc { font-size:15px; color:var(--gray); line-height:1.7; margin-bottom:28px; }
    @media(max-width:768px){ #detayContent{ grid-template-columns:1fr; } }
  </style>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="lang.js"></script>
  <script src="currency.js"></script>
  <script src="auth.js"></script>
  <script src="cart.js"></script>
  <script src="products.js"></script>
  <script src="urun-detay.js"></script>
</body>
</html>
